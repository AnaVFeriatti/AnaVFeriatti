<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projetos — Ana Feriatti</title>
  <meta name="description" content="Projetos e repositórios de Ana Feriatti no GitHub.">
  <meta name="author" content="Ana Feriatti">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="projetos">

  <main class="page">
    <div class="container">
      <section class="page-section">
        <h2 class="section-title reveal">Projetos</h2>
        <p class="section-subtitle reveal">Meus repositórios no GitHub</p>

        <div class="filters reveal" id="projectFilters">
          <button class="filter-btn active" data-lang="all">Todos</button>
        </div>
        <div class="result-count reveal" id="projectCount"></div>

        <div class="loading" id="loadingRepos" role="status" aria-live="polite">Carregando projetos</div>
        <div class="error-msg" id="errorRepos" style="display:none" role="alert"></div>
        <div class="projects-grid" id="repoList"></div>
      </section>
    </div>
  </main>

  <script src="js/bootstrap.js"></script>
</body>
</html>
